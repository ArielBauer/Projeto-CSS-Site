<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Document</title>
</head>
<body>
    <div class="position-fixed top-0 start-0 ms-4 p-3 rounded">
        <p class="h5"><i class="bi bi-whatsapp"></i> WhatsApp</p>
    </div>

    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="p-4 PINK" style="width: 820px;">

            <!-- BANNER DOWNLOAD -->
            <div class="p-3 m-2 rounded d-flex justify-content-between align-items-center LGREEN">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-laptop fs-2"></i>
                    <div>
                        <h5 class="m-0">Baixar o App</h5>
                        <p class="m-0">blablabla</p>
                    </div>
                </div>
                <button class="btn btn-success text-black">
                    Baixar <i class="bi bi-download"></i>
                </button>
            </div>

            <!-- SCAN -->
            <div class="p-4 m-2 rounded LGREEN">
                <div class="row align-items-stretch">

                    <!-- TEXTO -->
                    <div class="col-7 d-flex flex-column justify-content-between ps-3">
                        <div>
                            <h3 class="mb-4">Escaneie para entrar</h3>
                            <p class="mb-1">1</p>
                            <p class="mb-1">2</p>
                            <p class="mb-1">3</p>
                            <div class="mt-2">
                                <a href="#" class="text-black text-decoration-none">
                                    Precisa de ajuda? <i class="bi bi-arrow-up-right"></i>
                                </a>
                            </div>
                        </div>
                        <!-- CHECKBOX na base -->
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                            <label class="form-check-label" for="checkDefault">
                                Default checkbox
                            </label>
                        </div>
                    </div>

                    <!-- QR CODE -->
                    <div class="col-5 d-flex flex-column justify-content-between align-items-center pe-3">
                        <div class="qr-box w-75 BLACK"></div>
                        <!-- "Escaneie aqui" na base, alinhado com o checkbox -->
                        <div class="text-center mt-2">Texto</div>
                    </div>

                </div>
            </div>

            <!-- FOOTER -->
            <div class="text-center mt-2 p-3 GREEN">
                <p class="mb-1 h5">Linha de texto 1
                    <a href="#" class="text-black text-decoration-none h6">
                        começar <i class="bi bi-arrow-up-right"></i>
                    </a>
                </p>
                <p class="mb-1 h6">Linha de texto 2</p>
                <p class="mb-1">Linha de texto 3</p>
            </div>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
